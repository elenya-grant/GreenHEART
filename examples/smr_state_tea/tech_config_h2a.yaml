name: technology_config
description: this is a plant
technologies:
  ng_feedstock:
    performance_model:
      model: FeedstockPerformanceModel
    cost_model:
      model: FeedstockCostModel
    model_inputs:
      shared_parameters:
        commodity: natural_gas
        commodity_rate_units: MMBtu/h
      performance_parameters:
        rated_capacity: 1360.  # MMBtu/h Based on plant capacity 0.192 MMBtu/kg H2
      cost_parameters:
        cost_year: 2022
        price: 4.2  # USD/MMBtu
        annual_cost: 0.
        start_up_cost: 0.
  grid_feedstock:
    performance_model:
      model: FeedstockPerformanceModel
    cost_model:
      model: FeedstockCostModel
    model_inputs:
      shared_parameters:
        commodity: electricity
        commodity_rate_units: MW
      performance_parameters:
        rated_capacity: 6.3  # Based on plant capacity 0.88 kWh/kg H2
      cost_parameters:
        commodity_amount_units: MW*h
        cost_year: 2024
        price: 81.3  # USD/MWh, 2024 National average https://www.eia.gov/electricity/annual/html/epa_02_10.html
        annual_cost: 0.
        start_up_cost: 0.
  smr:
    performance_model:
      model: SteamMethaneReformerPerformanceModel
    cost_model:
      model: SteamMethaneReformerCostModel
    model_inputs:
      performance_parameters:
        system_capacity_tonnes_per_day: 170  # Based on 360 MW electrolyzer capacity
        natural_gas_usage_mmbtu_per_kg: 0.175  # 56.256 kWh/kg H2A lite 2024
        electricity_usage_kwh_per_kg: 0.13  # H2A lite 2024
      cost_parameters:
        # Linear interpolated to technology year 2027
        capex_per_kw: 412.67  # $/kW based on H2A lite  2024
        fixed_opex_per_kw_per_year: 12.29  # $/kW/year based on 2024 H2A lite
        variable_opex_per_kwh: 0.000449  # $/kWh based on 2024 H2A lite
        cost_year: 2023
