# Input YAML for hercules

# Name
name: example_03

###
# Describe this simulation setup
description: Wind and solar
dt: 1.0
starttime_utc: '2024-06-24T16:59:08Z' # Jun 24, 2024 16:59:08 UTC (Zulu time)
endtime_utc: '2024-06-24T17:07:08Z' # 8 minutes later
verbose: false
plant:
  interconnect_limit: 45000  # kW
wind_farm:
  component_type: WindFarm
  wake_method: precomputed
  floris_input_file: ../inputs/floris_input_large.yaml
  wind_input_filename: ../inputs/wind_input_large.ftr
  turbine_file_name: ../inputs/turbine_filter_model.yaml
  log_file_name: outputs/log_wind_sim.log
  log_channels:
    - power
  floris_update_time_s: 300.0  # Update wakes every 5 minutes
solar_farm:  # The name of component object 1
  component_type: SolarPySAMPVWatts
  solar_input_filename: ../inputs/solar_input.ftr
  lat: 39.7442
  lon: -105.1778
  elev: 1829
  system_capacity: 30000  # kW (30 MW)
  tilt: 0  # degrees
  losses: 0
  log_channels:
    - power
  initial_conditions:
    power: 30000  # kW
    dni: 1000
    poa: 1000
battery:
  component_type: BatterySimple
  energy_capacity: 10000  # total capacity of the battery in kWh (10 MWh)
  charge_rate: 10000  # charge rate in kW (10 MW)
  discharge_rate: 10000  # discharge rate in kW (10 MW)
  max_SOC: 0.9
  min_SOC: 0.1
  log_channels:
    - power
    - soc
    - power_setpoint
  allow_grid_power_consumption: false
  initial_conditions:
    SOC: 0.5
controller: null
